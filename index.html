<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Discord Bot của tôi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #4f46e5;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
    }

    footer {
      padding: 20px;
      background: #020617;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>🤖 Bot Discord của tôi</h1>
  <p>Bot đa năng cho server của bạn</p>
  <a class="btn" href="https://discord.com/oauth2/authorize?client_id=YOUR_ID&scope=bot&permissions=8">
    Mời Bot
  </a>
</header>

<section class="section">
  <h2>✨ Tính năng</h2>
  <div class="features">
    <div class="card">
      <h3>🎵 Music</h3>
      <p>Phát nhạc 24/7</p>
    </div>
    <div class="card">
      <h3>🛡️ Moderation</h3>
      <p>Quản lý server tự động</p>
    </div>
    <div class="card">
      <h3>🎮 Game</h3>
      <p>Mini game giải trí</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>📞 Liên hệ</h2>
  <p>Discord: yourname#1234</p>
</section>

<footer>
  © 2026 Bot của bạn
</footer>

</body>
</html>
